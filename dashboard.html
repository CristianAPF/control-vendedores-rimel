{% extends 'base.html' %}{% block content %}<h1>Usuarios y accesos</h1><div class="grid2"><section class="panel"><h2>Crear usuario</h2><form method="post"><label>Nombre completo<input name="full_name" required></label><label>Usuario<input name="username" required></label><label>Contraseña inicial<input name="password" type="password" minlength="8" required></label><label>Perfil<select name="role"><option value="seller">Vendedor</option><option value="manager">Gerencial</option></select></label><label>Vendedor asociado<select name="seller_name"><option value="">No corresponde</option>{% for s in sellers %}<option>{{s}}</option>{% endfor %}</select></label><button>Crear usuario</button></form></section><section class="panel"><h2>Usuarios existentes</h2><div class="table-wrap"><table><thead><tr><th>Usuario</th><th>Nombre</th><th>Perfil</th><th>Vendedor</th><th>Restablecer</th></tr></thead><tbody>{% for u in users %}<tr><td>{{u.username}}</td><td>{{u.full_name}}</td><td>{{u.role}}</td><td>{{u.seller_name or '-'}}</td><td><form method="post" action="/users/{{u.id}}/reset" class="inline"><input name="password" value="Rimel2026!" minlength="8"><button>Restablecer</button></form></td></tr>{% endfor %}</tbody></table></div></section></div>{% endblock %}
