{% extends 'base.html' %}{% block content %}<h1>Historial de visitas</h1><section class="panel"><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Vendedor</th><th>Cliente</th><th>Resultado</th><th>Observaciones</th><th>GPS</th></tr></thead><tbody>{% for v in visits %}<tr><td>{{v.created_at.strftime('%d/%m/%Y %H:%M')}}</td><td>{{v.seller}}</td><td>{{v.client.name}}</td><td>{{v.result}}</td><td>{{v.notes or ''}}</td><td>{{'Sí' if v.latitude else 'No'}}</td></tr>{% endfor %}</tbody></table></div></section>{% endblock %}
