services:
  - type: web
    name: rimel-vendedores
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rimel-db
          property: connectionString

databases:
  - name: rimel-db
    plan: starter
